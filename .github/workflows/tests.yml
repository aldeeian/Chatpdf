name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        # The test suite mocks PDFQuery, so the heavy ML stack
        # (torch / sentence-transformers / faiss) is not needed in CI.
        run: |
          pip install fastapi httpx pytest python-multipart \
                      langchain-community langchain-groq pypdf

      - name: Run test suite
        run: pytest tests/ -v
